{% extends 'freelance_hub/base.html' %}
{% block title %}Eliminar Proyecto{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-5">
        <div class="card p-3" style="background-color: var(--surf-container-highest);">
            <div class="card-body text-center py-4">
                <h4 class="mb-4 text-danger fw-bold">⚠️ Confirmar Eliminación</h4>
                <p class="fs-5">¿Estás seguro que deseas eliminar el proyecto?</p>
                <p class="fw-bold fs-4 text-dark">{{ proyecto.nombre }}</p>
                <p class="text-muted small">Esta acción no se puede deshacer.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'freelance_hub:lista_proyectos' %}" class="btn" style="background-color: transparent; border: 1px solid var(--on-surf-variant); color: var(--on-surf);">Cancelar</a>
                    <button type="submit" class="btn text-white" style="background-color: #ba1a1a;">Sí, eliminar permanentemente</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
